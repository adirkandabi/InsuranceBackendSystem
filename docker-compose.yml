
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aigent_insurance_db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Aigent_Insurance_2026!
    volumes:
      - mssql_data:/var/opt/mssql

volumes:
  mssql_data: